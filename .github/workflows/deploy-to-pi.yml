name: Deploy to Raspberry Pi Edge Server

# main 브랜치에 푸시되거나, GitHub Actions 탭에서 수동 실행 시 트리거
on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    # 라즈베리파이에 설치된 Self-Hosted Runner에서 실행
    runs-on: self-hosted

    steps:
      # Step 1: 최신 코드 동기화
      - name: Pull latest code
        run: |
          cd $HOME/ROBO-Path_project
          git pull origin main

      # Step 2: GitHub Secrets에서 .env 파일 생성 (기밀 정보 주입)
      - name: Write .env file from Secrets
        run: |
          cat > $HOME/ROBO-Path_project/.env << 'ENVEOF'
          SUPABASE_URL=${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY=${{ secrets.SUPABASE_KEY }}
          GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }}
          STORAGE_BASE_PATH=/mnt/ssd/robo-path-data
          ENVEOF

      # Step 3: Python 패키지 업데이트
      - name: Update Python dependencies
        run: |
          source $HOME/ROBO-Path_project/venv/bin/activate
          pip install -r $HOME/ROBO-Path_project/requirements.txt

      # Step 4: 시스템 설정 파일 동기화 (Systemd, Nginx)
      - name: Sync system config files
        run: |
          sudo cp $HOME/ROBO-Path_project/config/pi_services/robo-path-api.service \
                  /etc/systemd/system/robo-path-api.service
          sudo cp $HOME/ROBO-Path_project/config/pi_services/robo-path-web.service \
                  /etc/systemd/system/robo-path-web.service
          sudo cp $HOME/ROBO-Path_project/config/nginx/robo-path.conf \
                  /etc/nginx/sites-available/robo-path
          sudo ln -sf /etc/nginx/sites-available/robo-path \
                      /etc/nginx/sites-enabled/robo-path
          sudo systemctl daemon-reload
          sudo systemctl enable robo-path-api robo-path-web

      # Step 5: 애플리케이션 서비스 재시작
      # 앱 코드(api.py, app.py) 미구현 단계에서는 실패해도 파이프라인을 중단하지 않음
      - name: Restart application services
        run: |
          sudo systemctl restart robo-path-api || echo "⚠️ robo-path-api 시작 실패 (앱 미구현 상태일 수 있음)"
          sudo systemctl restart robo-path-web || echo "⚠️ robo-path-web 시작 실패 (앱 미구현 상태일 수 있음)"

      # Step 6: Nginx 설정 검증 후 리로드
      - name: Reload Nginx
        run: sudo nginx -t && sudo systemctl reload nginx

      # Step 7: 배포 결과 리포트 (서비스 상태 출력 - 실패해도 워크플로우 중단 안 함)
      - name: Report deployment status
        run: |
          echo "=== 배포 완료 상태 리포트 ==="
          sudo systemctl is-active robo-path-api && echo "✅ FastAPI 서버: 실행 중" || echo "⏸️ FastAPI 서버: 미실행 (앱 코드 구현 후 활성화됨)"
          sudo systemctl is-active robo-path-web && echo "✅ Streamlit 서버: 실행 중" || echo "⏸️ Streamlit 서버: 미실행 (앱 코드 구현 후 활성화됨)"
          sudo systemctl is-active nginx && echo "✅ Nginx: 실행 중" || echo "❌ Nginx: 오류"
